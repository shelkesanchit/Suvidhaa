services:
  # Backend API Service
  - type: web
    name: suvidha-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: suvidha-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this to your backend URL, e.g., https://suvidha-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Admin Panel Static Site
  - type: web
    name: suvidha-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this to your backend URL, e.g., https://suvidha-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
